[protocol]
name = "ekklesia-hydra"
scope = "public"
version = "1.0.0"
description = "Describing the Hydra integration for Ekklesia"
main = "main.tx3"

[registry]
url = "https://tx3.land"

[profiles.devnet]
chain = "CardanoDevnet"

[profiles.preview]
chain = "CardanoPreview"

[profiles.preprod]
chain = "CardanoPreprod"

[profiles.mainnet]
chain = "CardanoMainnet"

[[bindings]]
output_dir = "../src"

[bindings.template]
repo = "tx3-lang/web-sdk"
path = ".trix/client-lib"
ref = "bindgen-v1alpha2"

[[wallets]]
name = "alice"
random_key = true

[[wallets]]
name = "bob"
random_key = true
