name: Promote development to staging

# Keeps a single open development -> staging promotion PR alive. As features
# merge into development, GitHub keeps this PR's diff current, so it acts as the
# running accumulator of everything queued for the next preprod release
# candidate. A human merges it when development is ready to test on staging.
#
# No versioning happens here. development is never versioned; it only
# accumulates changeset files.
on:
  push:
    branches: [development]

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_MANAGER_APP_ID }}
          private-key: ${{ secrets.RELEASE_MANAGER_APP_PRIVATE_KEY }}

      - name: Ensure an open development -> staging promotion PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          existing=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --base staging --head development --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Promotion PR #$existing is already open; GitHub keeps its diff current."
            exit 0
          fi
          ahead=$(gh api "repos/$GITHUB_REPOSITORY/compare/staging...development" --jq '.ahead_by')
          if [ "$ahead" -eq 0 ]; then
            echo "development is not ahead of staging; nothing to promote."
            exit 0
          fi
          gh pr create --repo "$GITHUB_REPOSITORY" \
            --base staging --head development \
            --title "Promote development to staging" \
            --body "Accumulator PR. Merging this promotes the queued features into staging, which builds a release-candidate image for the preprod testnet. Version bumps are cut later, on main." \
            --label promotion
