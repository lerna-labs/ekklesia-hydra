name: Release

# Runs on every push to main. changesets/action checks for pending changeset
# files: if there are any (a staging -> main promotion just landed), it
# opens/updates a "Version Packages" PR that bumps package.json and rolls the
# changesets into CHANGELOG.md. Once that PR is merged (no pending changesets
# left), the same action runs the tag step, which pushes a v<version> tag —
# that's what publish.yml builds the production image from.
#
# There is no prerelease mode here. Release candidates are ephemeral snapshots
# built on staging (staging-rc.yml); main only ever cuts clean X.Y.Z versions.
# Commits, the release PR, and the tag are attributed to the Ekklesia Release
# Manager App rather than github-actions[bot].
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_MANAGER_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_MANAGER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity for the release bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          user_id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${user_id}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Create release PR or tag the release
        uses: changesets/action@v1
        with:
          title: "chore: release"
          commit: "chore: version packages"
          version: npm run changeset:version
          publish: npm run changeset:tag
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
