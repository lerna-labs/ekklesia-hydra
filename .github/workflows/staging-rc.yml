name: Staging release candidate

# On every push to staging, build and push a release-candidate image to GHCR
# for the preprod testnet to pull. The RC version is a Changesets snapshot
# (e.g. 1.2.0-rc-20260718154506) computed from the pending changesets: it
# reflects the real next version but is ephemeral — nothing is committed to
# staging, and the changeset files stay intact so the real version bump can
# happen later on main.
#
# This workflow also keeps a single open staging -> main promotion PR alive,
# the accumulator for the next production release.
on:
  push:
    branches: [staging]

concurrency:
  group: staging-rc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lerna-labs/ekklesia-hydra

jobs:
  gate:
    # Skip the RC build entirely when staging already matches the released main
    # (nothing unreleased to preview — e.g. right after a release backport).
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.g.outputs.build }}
    steps:
      - id: g
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          main_tree=$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq '.commit.tree.sha')
          head_tree=$(gh api "repos/$GITHUB_REPOSITORY/commits/staging" --jq '.commit.tree.sha')
          if [ "$main_tree" = "$head_tree" ]; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "staging matches the released main; nothing unreleased to preview."
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

  rc-image:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Compute snapshot RC version
        id: rc
        run: |
          pending=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | head -1)
          if [ -n "$pending" ]; then
            npx changeset version --snapshot rc
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
            echo "has_rc=true" >> "$GITHUB_OUTPUT"
            # Discard the snapshot bump. Nothing is committed to staging; the
            # changeset files must stay intact for the real release on main.
            git checkout -- .
          else
            # No pending changesets: nothing new to release-candidate. Refresh the
            # moving staging image but do NOT emit a version tag, which would be
            # the plain release version and collide with the production tag.
            echo "has_rc=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets; publishing the staging image without a version tag."
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        # Registry cache export (cache-to type=registry) needs the
        # docker-container driver this sets up; the default docker driver
        # cannot export a registry cache.
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.rc.outputs.version }},enable=${{ steps.rc.outputs.has_rc == 'true' }}
            type=raw,value=staging
            type=sha,format=short,prefix=staging-sha-

      - name: Build and push (staging RC)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-cache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-cache,mode=max
          secrets: |
            npmrc=${{ secrets.NPMRC }}

  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_MANAGER_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_MANAGER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open or refresh the staging -> main promotion PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Compare content trees, not commit counts (merge-commit asymmetry
          # would otherwise open empty PRs). Identical trees mean nothing to promote.
          base_tree=$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq '.commit.tree.sha')
          head_tree=$(gh api "repos/$GITHUB_REPOSITORY/commits/staging" --jq '.commit.tree.sha')
          if [ "$base_tree" = "$head_tree" ]; then
            echo "staging and main have identical trees; nothing to promote."
            exit 0
          fi
          # Body lists the pending changesets so the accumulator shows what is queued.
          node .github/scripts/promotion-body.mjs main > pr-body.md
          num=$(gh pr list --repo "$GITHUB_REPOSITORY" --base main --head staging --state open --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            jq -Rs '{body: .}' pr-body.md | gh api -X PATCH "repos/$GITHUB_REPOSITORY/pulls/$num" --input - >/dev/null
            echo "Refreshed promotion PR #$num body."
          else
            gh pr create --repo "$GITHUB_REPOSITORY" --base main --head staging \
              --title "Promote staging to main" --body-file pr-body.md --label promotion
          fi
