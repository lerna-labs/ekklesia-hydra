name: Prerelease

# Runs on every push to staging. staging stays continuously in Changesets
# prerelease mode ("rc") — this workflow enters that mode on its first run
# if it isn't already active, then behaves like release.yml: opens/updates a
# release-candidate "Version Packages" PR from pending changesets, or, once
# that's merged, tags the release candidate (v<version>-rc.N) and pushes it.
#
# That RC tag intentionally does NOT trigger the production GHCR publish
# (publish.yml's tag trigger excludes prerelease tags) — pushing a testnet
# image from an RC tag stays the existing manual publish-staging.yml
# dispatch.
#
# Exiting prerelease mode (to cut a real X.Y.Z version for main) is a manual
# step: run 'npm run changeset:pre:exit', commit, and include it in the
# staging -> main promotion.
on:
  push:
    branches: [staging]

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_MANAGER_APP_ID }}
          private-key: ${{ secrets.RELEASE_MANAGER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity for the release bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          user_id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${user_id}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Enter Changesets prerelease mode if not already active
        run: |
          if [ ! -f .changeset/pre.json ]; then
            npm run changeset:pre:enter
            git add .changeset/pre.json
            git commit -m "chore: enter prerelease mode (rc)"
            git push origin HEAD:staging
          fi

      - name: Create prerelease PR or tag the release candidate
        uses: changesets/action@v1
        with:
          title: "chore: release candidate"
          commit: "chore: version packages (rc)"
          version: npm run changeset:version
          publish: npm run changeset:tag
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
